<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#1f2330" />
      <stop offset="100%" stop-color="#0d0e12" />
    </radialGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b" />
      <stop offset="50%" stop-color="#ff3e3e" />
      <stop offset="100%" stop-color="#b30000" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" stop-color="#ff3e3e" stop-opacity="0.6" />
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="url(#accentGrad)" stroke-width="8" />
  
  <!-- Manga burst/speed lines in background (subtle) -->
  <path d="M 256,256 L 60,60 M 256,256 L 452,60 M 256,256 L 60,452 M 256,256 L 452,452 M 256,256 L 256,30 M 256,256 L 256,482 M 256,256 L 30,256 M 256,256 L 482,256" stroke="#ff3e3e" stroke-width="1.5" stroke-opacity="0.15" stroke-dasharray="10, 15" />
  
  <!-- Graphic icon elements: Manga Page fold and Profit Trend (Ascending Arrow with Manga styling) -->
  <g filter="url(#neonGlow)">
    <!-- Stylized "M" for Manga and Profit, resembling speed-lines -->
    <path d="M 120,380 L 180,180 L 256,300 L 332,180 L 392,380" fill="none" stroke="url(#accentGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Rising trend arrow inside M -->
    <path d="M 210,320 L 256,230 L 302,320" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
    
    <!-- Speed sparks -->
    <polygon points="256,110 270,140 256,170 242,140" fill="#ffffff" />
    <polygon points="150,220 160,235 150,250 140,235" fill="#ff6b6b" />
    <polygon points="362,220 372,235 362,250 352,235" fill="#ff6b6b" />
  </g>
</svg>
